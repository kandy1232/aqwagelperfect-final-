<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel | AqwaGel</title>
<meta name="robots" content="noindex, nofollow">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;line-height:1.6;color:#333;background:#f1f5f9;min-width:320px}
img{max-width:100%;height:auto;display:block}
a{text-decoration:none;color:#1a3c6e}
button{cursor:pointer;font-family:inherit;border:none;background:none}
.site-header{background:#1a3c6e;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.header-inner{max-width:1200px;margin:0 auto;padding:0 1rem;display:flex;align-items:center;justify-content:space-between;height:64px}
.logo{display:flex;align-items:center;gap:.5rem;color:#fff;font-size:1.4rem;font-weight:700}
.logo img{height:40px;width:auto;display:block}
.container{max-width:1200px;margin:0 auto;padding:1rem}
.section{padding:2rem 1rem}
.login-box{max-width:400px;margin:5rem auto;background:#fff;padding:2rem;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.login-box h2{text-align:center;color:#1a3c6e;margin-bottom:1.5rem}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:.85rem;font-weight:600;color:#666;margin-bottom:.35rem}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:.6rem .75rem;border:1px solid #e2e8f0;border-radius:8px;font-size:.9rem;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#1a3c6e}
.form-group textarea{resize:vertical;min-height:80px}
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.75rem 1.5rem;border-radius:8px;font-weight:600;font-size:.95rem;cursor:pointer}
.btn-primary{background:#1a3c6e;color:#fff}
.btn-danger{background:#c62828;color:#fff}
.btn-success{background:#2e7d32;color:#fff}
.btn-sm{padding:.4rem .75rem;font-size:.85rem}
.admin-panel{display:none}
.admin-panel.active{display:block}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:2rem}
.stat-card{background:#fff;padding:1.25rem;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);text-align:center}
.stat-card h3{font-size:2rem;color:#1a3c6e;margin-bottom:.25rem}
.stat-card p{color:#666;font-size:.9rem}
.product-table{width:100%;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:2rem}
.product-table table{width:100%;border-collapse:collapse}
.product-table th{background:#1a3c6e;color:#fff;padding:.75rem;text-align:left;font-size:.85rem}
.product-table td{padding:.75rem;border-bottom:1px solid #e2e8f0;font-size:.9rem}
.product-table tr:hover{background:#f8fafc}
.product-table img{width:60px;height:45px;object-fit:cover;border-radius:4px}
.actions{display:flex;gap:.5rem}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:12px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.12)}
.modal-header{padding:1rem 1.25rem;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center}
.modal-header h3{font-size:1.1rem;color:#1a3c6e}
.modal-close{font-size:1.5rem;color:#666;line-height:1;cursor:pointer}
.modal-body{padding:1.25rem}
.tabs{display:flex;gap:.5rem;margin-bottom:1.5rem;border-bottom:2px solid #e2e8f0}
.tab{padding:.75rem 1.25rem;font-weight:600;color:#666;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab.active{color:#1a3c6e;border-bottom-color:#1a3c6e}
.tab-content{display:none}
.tab-content.active{display:block}
.review-item{padding:1rem;border-bottom:1px solid #e2e8f0}
.review-item:last-child{border-bottom:none}
.review-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
.review-author{font-weight:600;color:#1a3c6e}
.review-stars{color:#f9a825}
.review-text{color:#666;font-size:.9rem}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;padding:.75rem 1.25rem;background:#1a3c6e;color:#fff;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:300;transform:translateY(100px);opacity:0;transition:all .3s;font-size:.9rem}
.toast.show{transform:translateY(0);opacity:1}
@media(max-width:768px){.stats-grid{grid-template-columns:1fr}.product-table{overflow-x:auto}.product-table table{min-width:600px}}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="logo" aria-label="AqwaGel Home">
      <img src="img/logo.png" alt="AqwaGel">
    </a>
  </div>
</header>

<div class="container">
  <!-- Login Screen -->
  <div id="loginScreen">
    <div class="login-box">
      <h2>🔐 Admin Login</h2>
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="adminPass" placeholder="Enter admin password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">Login</button>
      </form>
      <p style="text-align:center;margin-top:1rem;color:#666;font-size:.85rem">Default password: <code>aqwagel2026</code></p>
    </div>
  </div>

  <!-- Admin Panel -->
  <div id="adminPanel" class="admin-panel">
    <div class="stats-grid">
      <div class="stat-card">
        <h3 id="statProducts">0</h3>
        <p>Total Products</p>
      </div>
      <div class="stat-card">
        <h3 id="statReviews">0</h3>
        <p>Total Reviews</p>
      </div>
      <div class="stat-card">
        <h3 id="statStock">0</h3>
        <p>In Stock</p>
      </div>
      <div class="stat-card">
        <h3 id="statCategories">0</h3>
        <p>Categories</p>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('products')">Products</div>
      <div class="tab" onclick="switchTab('reviews')">Reviews</div>
      <div class="tab" onclick="switchTab('add')">Add Product</div>
    </div>

    <!-- Products Tab -->
    <div id="tab-products" class="tab-content active">
      <div class="product-table">
        <table>
          <thead>
            <tr>
              <th>Image</th>
              <th>Name</th>
              <th>Category</th>
              <th>Price (LKR)</th>
              <th>Stock</th>
              <th>Reviews</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="productsTable"></tbody>
        </table>
      </div>
    </div>

    <!-- Reviews Tab -->
    <div id="tab-reviews" class="tab-content">
      <div id="reviewsList" style="background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08)"></div>
    </div>

    <!-- Add Product Tab -->
    <div id="tab-add" class="tab-content">
      <div style="background:#fff;padding:1.5rem;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08)">
        <h3 style="color:#1a3c6e;margin-bottom:1rem">Add New Product</h3>
        <form onsubmit="addProduct(event)">
          <div class="form-group">
            <label>Product ID (no spaces)</label>
            <input type="text" id="newId" placeholder="e.g. world-map-2" required>
          </div>
          <div class="form-group">
            <label>Name (English)</label>
            <input type="text" id="newName" placeholder="e.g. World Map Poster v2" required>
          </div>
          <div class="form-group">
            <label>Name (Sinhala)</label>
            <input type="text" id="newNameSi" placeholder="e.g. ලෝක සිතියමේ පෝස්ටර්">
          </div>
          <div class="form-group">
            <label>Category</label>
            <select id="newCat" required>
              <option value="maps">Maps</option>
              <option value="science">Science</option>
              <option value="language">Language</option>
              <option value="math">Math</option>
              <option value="history">History</option>
              <option value="art">Art & Coloring</option>
              <option value="stationery">Stationery</option>
            </select>
          </div>
          <div class="form-group">
            <label>Price (LKR)</label>
            <input type="number" id="newPrice" placeholder="e.g. 650" required>
          </div>
          <div class="form-group">
            <label>Image URL</label>
            <input type="url" id="newImage" placeholder="https://images.unsplash.com/..." required>
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea id="newDesc" placeholder="Short description..."></textarea>
          </div>
          <div class="form-group">
            <label>
              <input type="checkbox" id="newStock" checked> In Stock
            </label>
          </div>
          <button type="submit" class="btn btn-success">Add Product</button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Edit Product Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Edit Product</h3>
      <span class="modal-close" onclick="closeEditModal()">&times;</span>
    </div>
    <div class="modal-body">
      <form onsubmit="saveEdit(event)">
        <input type="hidden" id="editId">
        <div class="form-group">
          <label>Name (English)</label>
          <input type="text" id="editName" required>
        </div>
        <div class="form-group">
          <label>Name (Sinhala)</label>
          <input type="text" id="editNameSi">
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="editCat" required>
            <option value="maps">Maps</option>
            <option value="science">Science</option>
            <option value="language">Language</option>
            <option value="math">Math</option>
            <option value="history">History</option>
            <option value="art">Art & Coloring</option>
            <option value="stationery">Stationery</option>
          </select>
        </div>
        <div class="form-group">
          <label>Price (LKR)</label>
          <input type="number" id="editPrice" required>
        </div>
        <div class="form-group">
          <label>Image URL</label>
          <input type="url" id="editImage" required>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="editDesc"></textarea>
        </div>
        <div class="form-group">
          <label>
            <input type="checkbox" id="editStock"> In Stock
          </label>
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
      </form>
    </div>
  </div>
</div>

<script>
const ADMIN_PASS = 'aqwagel2026';

function getProducts(){ return JSON.parse(localStorage.getItem('aq_products')||'[]'); }
function saveProducts(products){ localStorage.setItem('aq_products', JSON.stringify(products)); }

function handleLogin(e){
  e.preventDefault();
  const pass = document.getElementById('adminPass').value;
  if(pass === ADMIN_PASS){
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminPanel').classList.add('active');
    loadDashboard();
    showToast('Login successful!');
  } else {
    alert('Wrong password! Try: aqwagel2026');
  }
}

function loadDashboard(){
  const products = getProducts();

  // Stats
  document.getElementById('statProducts').textContent = products.length;
  document.getElementById('statStock').textContent = products.filter(p=>p.stock).length;
  document.getElementById('statCategories').textContent = [...new Set(products.map(p=>p.cat))].length;

  let totalReviews = 0;
  products.forEach(p=>{ if(p.reviews) totalReviews += p.reviews.length; });
  document.getElementById('statReviews').textContent = totalReviews;

  // Products table
  const tbody = document.getElementById('productsTable');
  tbody.innerHTML = products.map(p=>{
    const reviewCount = p.reviews ? p.reviews.length : 0;
    return `<tr>
      <td><img src="${p.image}" alt="${p.name}"></td>
      <td><strong>${p.name}</strong><br><small style="color:#666">${p.nameSi||''}</small></td>
      <td>${p.cat}</td>
      <td>LKR ${p.price}</td>
      <td>${p.stock ? '✅' : '❌'}</td>
      <td>${reviewCount}</td>
      <td>
        <div class="actions">
          <button class="btn btn-primary btn-sm" onclick="openEditModal('${p.id}')">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deleteProduct('${p.id}')">Delete</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  // Reviews list
  const reviewsDiv = document.getElementById('reviewsList');
  let allReviews = [];
  products.forEach(p=>{
    if(p.reviews){
      p.reviews.forEach(r=>{
        allReviews.push({...r, productName: p.name, productId: p.id});
      });
    }
  });

  if(allReviews.length === 0){
    reviewsDiv.innerHTML = '<p style="padding:2rem;text-align:center;color:#666">No reviews yet.</p>';
  } else {
    reviewsDiv.innerHTML = allReviews.map(r=>`
      <div class="review-item">
        <div class="review-header">
          <div>
            <span class="review-author">${r.name}</span> 
            <span style="color:#666;font-size:.85rem">on <strong>${r.productName}</strong></span>
          </div>
          <span style="color:#666;font-size:.8rem">${r.date}</span>
        </div>
        <div class="review-stars">${'★'.repeat(r.stars)}${'☆'.repeat(5-r.stars)}</div>
        <p class="review-text">${r.text}</p>
      </div>
    `).join('');
  }
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
}

function openEditModal(id){
  const products = getProducts();
  const p = products.find(x=>x.id===id);
  if(!p) return;

  document.getElementById('editId').value = p.id;
  document.getElementById('editName').value = p.name;
  document.getElementById('editNameSi').value = p.nameSi || '';
  document.getElementById('editCat').value = p.cat;
  document.getElementById('editPrice').value = p.price;
  document.getElementById('editImage').value = p.image;
  document.getElementById('editDesc').value = p.desc || '';
  document.getElementById('editStock').checked = p.stock;

  document.getElementById('editModal').classList.add('active');
}

function closeEditModal(){
  document.getElementById('editModal').classList.remove('active');
}

function saveEdit(e){
  e.preventDefault();
  const id = document.getElementById('editId').value;
  const products = getProducts();
  const idx = products.findIndex(p=>p.id===id);

  if(idx === -1){
    alert('Product not found!');
    return;
  }

  products[idx] = {
    ...products[idx],
    name: document.getElementById('editName').value,
    nameSi: document.getElementById('editNameSi').value,
    cat: document.getElementById('editCat').value,
    price: parseInt(document.getElementById('editPrice').value),
    image: document.getElementById('editImage').value,
    desc: document.getElementById('editDesc').value,
    stock: document.getElementById('editStock').checked
  };

  saveProducts(products);
  closeEditModal();
  loadDashboard();
  showToast('Product updated!');
}

function deleteProduct(id){
  if(!confirm('Are you sure you want to delete this product?')) return;
  const products = getProducts().filter(p=>p.id!==id);
  saveProducts(products);
  loadDashboard();
  showToast('Product deleted!');
}

function addProduct(e){
  e.preventDefault();
  const products = getProducts();

  const newProduct = {
    id: document.getElementById('newId').value,
    name: document.getElementById('newName').value,
    nameSi: document.getElementById('newNameSi').value,
    cat: document.getElementById('newCat').value,
    price: parseInt(document.getElementById('newPrice').value),
    image: document.getElementById('newImage').value,
    desc: document.getElementById('newDesc').value,
    stock: document.getElementById('newStock').checked,
    reviews: [],
    rating: 0
  };

  if(products.find(p=>p.id===newProduct.id)){
    alert('Product ID already exists! Use a different ID.');
    return;
  }

  products.push(newProduct);
  saveProducts(products);

  // Reset form
  e.target.reset();
  document.getElementById('newStock').checked = true;

  loadDashboard();
  showToast('Product added successfully!');

  // Switch to products tab
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelector('.tab:nth-child(1)').classList.add('active');
  document.getElementById('tab-products').classList.add('active');
}

function showToast(msg){
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t);
  setTimeout(()=>t.classList.add('show'),10);
  setTimeout(()=>{t.classList.remove('show'); setTimeout(()=>t.remove(),300);},2500);
}
</script>
</body>
</html>
